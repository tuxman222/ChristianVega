<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dante • Service Dog Profile</title>
  <meta name="description" content="Public profile for Dante, a service dog in training: tasks, etiquette, ADA access, contact info, gear and health notes." />
  <style>
    :root{
      --bg:#0f1116; --card:#171a22; --ink:#e9edf1; --muted:#aab3c0;
      --accent:#79ffe1; --accent-2:#ffd479; --ok:#70e000; --warn:#ffd166;
      --max:920px;
      --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    header{
      max-width:var(--max); margin:24px auto 0; padding:16px;
      display:grid; gap:16px; grid-template-columns: 140px 1fr;
      align-items:center;
    }
    .logo{
      width:120px; height:120px; border-radius:50%; overflow:hidden;
      border:2px solid #2a2f3a; background:#111;
    }
    .logo img{width:100%;height:100%;object-fit:cover}
    h1{margin:0;font-size:1.9rem;line-height:1.15}
    .tagline{color:var(--muted);margin-top:6px}
    .wrap{max-width:var(--max);margin:0 auto;padding:0 16px 64px}
    .grid{display:grid; gap:16px; grid-template-columns: repeat(12,1fr)}
    .card{
      background:var(--card); border:1px solid #262b36; border-radius:var(--radius);
      padding:16px;
    }
    .span-12{grid-column:span 12}
    .span-8{grid-column:span 8}
    .span-6{grid-column:span 6}
    .span-4{grid-column:span 4}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#222836;border:1px solid #2d3442;color:var(--muted);font-size:.85rem}
    h2{margin:.2rem 0 .6rem;font-size:1.15rem;letter-spacing:.2px}
    ul{margin:.2rem 0 .2rem 1rem;padding:0}
    li{margin:.25rem 0}
    .facts{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .kv{display:grid;grid-template-columns:120px 1fr;gap:8px;margin:6px 0;color:var(--muted)}
    .kv b{color:var(--ink)}
    .eta li{margin:.35rem 0}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    .footer{color:var(--muted);text-align:center;margin-top:28px;font-size:.9rem}
    .btn{
      display:inline-block;padding:10px 14px;border-radius:10px;border:1px solid #2a3040;background:#1a1f2b;
    }
    code{background:#11161f;border:1px solid #242a36;padding:2px 6px;border-radius:6px}
    @media (max-width:840px){
      header{grid-template-columns: 100px 1fr}
      .span-8,.span-6{grid-column:span 12}
      .span-4{grid-column:span 12}
    }

    /* ==============================
       Click-to-zoom fullscreen photo
       ============================== */
    .logo button{
      all:unset;
      display:block;
      width:120px; height:120px;
      border-radius:50%;
      overflow:hidden;
      cursor: zoom-in;
    }
    .logo button:focus{
      outline: 2px solid rgba(121,255,225,.7);
      outline-offset: 3px;
    }

    .lightbox{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.88);
      display:none;
      place-items:center;
      z-index:9999;
      padding:24px;
    }
    .lightbox.open{display:grid;}

    .lightbox img{
      max-width:min(980px, 96vw);
      max-height: 90vh;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
    }

    .lightbox .hint{
      margin-top:12px;
      color: rgba(255,255,255,.75);
      font-size:.95rem;
